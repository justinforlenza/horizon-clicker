<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>horizon-clicker</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body class="flex flex-col h-screen p-5 gap-4">
  <header class="font-bold italic text-5xl text-center rounded-4xl">
    Horizon Clicker
  </header>

  <main class="flex flex-1 gap-4">
    <div
      class="flex-1 flex justify-center items-center flex-col p-5 text-white bg-black/75 rounded-4xl border-gray-600 border-2 shadow-2xl">
      <!-- clicker area -->
      <p id="scoreDisplay" class="mb-10 text-5xl">0 rpm</p>


      <button id="clicker" class="active:scale-95 transition-transform">
        <img src="/src/assets/engine.webp" class="max-w-sm">
      </button>

    </div>

    <div class="flex-1 flex flex-col text-white bg-black/75 rounded-4xl border-gray-600 border-2 shadow-2xl p-4 gap-4">
      <h1 class="text-5xl text-center">Store</h1>

      <section class="flex flex-wrap justify-center gap-4">


        <button id="upgradeOne" class="flex transition-all bg-black items-center text-lg p-4 border active:scale-105 border-gray-700 active:bg-gray-800 rounded-2xl">
          <img class="h-16 invert" src="/src/assets/cylinder.png" />
          <div>
            <p id="upgradeOneCount">0 Cylinder</p>
            <p>Cost: 100rpm</p>
          </div>
        </button>

        <button class="flex transition-all bg-black items-center text-lg p-4 border active:scale-105 border-gray-700 active:bg-gray-800 rounded-2xl">
          <img class="h-16 invert" src="/src/assets/injector.png" />
          <div>
            <p>0 Fuel Injectors</p>
            <p>Cost: 1000rpm</p>
          </div>
        </button>

        <button class="flex transition-all bg-black items-center text-lg p-4 border active:scale-105 border-gray-700 active:bg-gray-800 rounded-2xl">
          <img class="h-16 invert" src="/src/assets/turbo.png" />
          <div>
            <p>0 Turbos</p>
            <p>Cost: 1000000000rpm</p>
          </div>
        </button>
      </section>

    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
