<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>horizon-clicker</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body class="flex flex-col h-screen">
  <header class="bg-pink-500 text-white italic text-5xl text-center">
    Horizon Clicker
  </header>

  <main class="flex flex-1">
    <div class="flex-1 flex justify-center items-center flex-col p-5 bg-red-500">
      <!-- clicker area -->
      <p id="scoreDisplay" class="mb-10 text-5xl">0 rpm</p>


      <button id="clicker" class="active:scale-95">
        <img src="/src/assets/engine.webp" class="max-w-sm">
      </button>

    </div>

    <div class="flex-1 flex flex-col bg-blue-500 p-4 gap-4">
      <h1 class="text-5xl text-center">Store</h1>

      <section class="flex flex-wrap justify-center gap-4">
        <button class="flex bg-white items-center text-lg p-4 border border-black active:bg-gray-300">
          <img class="h-16" src="/src/assets/cylinder.png" />
          <div>
            <p>0 Cylinder</p>
            <p>Cost: 100rpm</p>
          </div>
        </button>

        <button class="flex bg-white items-center text-lg p-4 border border-black active:bg-gray-300">
          <img class="h-16" src="/src/assets/injector.png" />
            <div>
            <p>0 Fuel Injectors</p>
            <p>Cost: 1000rpm</p>
          </div>
        </button>

        <button class="flex bg-white items-center text-lg p-4 border border-black active:bg-gray-300">
          <img class="h-16" src="/src/assets/turbo.png" />
                      <div>
            <p>0 Turbos</p>
            <p>Cost: 1000000000rpm</p>
          </div>
        </button>
      </section>

    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
